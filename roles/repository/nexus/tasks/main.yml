- name: Disable SELinux
  ansible.posix.selinux:
    state: disabled
  notify: restart host

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

    
- name: Install JDK
  ansible.builtin.import_role: 
    name: cloudera.exe.jdk

- name: Install tls certs
  ansible.builtin.import_role: 
    name: cloudera.exe.tls.generate_csr
  vars:
    acl_mode: root

- name: Sign CSR
  ansible.builtin.import_role: 
    name: cloudera.exe.tls.signing

- name: Install Signed Cert
  ansible.builtin.import_role: 
    name: cloudera.exe.tls.install_certs

- name: Install httpd
  ansible.builtin.package:
    name: httpd
    state: present
  when: httpd_setup_enable|bool

- name: Install mod_ssl
  ansible.builtin.package:
    name: mod_ssl
    state: present
  when: httpd_setup_enable|bool

- name: Start and enable service httpd
  ansible.builtin.service:
    name: httpd
    state: started
    enabled: yes 
  when: httpd_setup_enable|bool

- name: Install Nexus registry
  ansible.builtin.import_role: 
    name: nexus3-oss

